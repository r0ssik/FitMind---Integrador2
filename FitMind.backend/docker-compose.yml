version: '3.8'

services:
  fitmind-api:
    image: fitmind-api
    build:
      context: .
      dockerfile: FitMind.BackEnd.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - fitmind-db
    networks:
      - fitmind-network

  fitmind-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fitmind
      POSTGRES_USER: fitmind_user
      POSTGRES_PASSWORD: fitmind_pass
    ports:
      - "5432:5432"
    volumes:
      - fitmind-pgdata:/var/lib/postgresql/data
    networks:
      - fitmind-network

volumes:
  fitmind-pgdata:

networks:
  fitmind-network:
    driver: bridge
